# Nome del workflow visualizzato su GitHub
name: Docker - Build and Push Multi-Arch Image
on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'yarn.lock'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'nginx.conf.template'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker-image.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'yarn.lock'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'nginx.conf.template'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker-image.yml'
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'yarn.lock'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'nginx.conf.template'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker-image.yml'
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    name: Build and push Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Abilita il tag con lo short SHA del commit (es. a1b2c3d)
            type=sha,format=short
            # Abilita il tag 'latest' solo per il branch main
            type=raw,value=latest,enable={{is_default_branch}}
            # Abilita il tag con il nome del branch
            type=ref,event=branch
            # Aggiunge il nome del branch della PR
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{  strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge:
    name: Merge Images
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Retrieve SHA for tagging
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sha_short=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
            branch_name="${{ github.head_ref }}"
          else
            sha_short=$(echo ${{ github.sha }} | cut -c1-7)
            branch_name="${{ github.ref_name }}"
          fi
          
          # Sanitize branch_name for docker tag (replace / with -)
          branch_name=$(echo $branch_name | tr '/' '-')
          # Ensure repository name is lowercase
          REPO_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          # Costruisci l'elenco dei tag
          tags="-t ${{ env.REGISTRY }}/${REPO_LOWER}:${sha_short} -t ${{ env.REGISTRY }}/${REPO_LOWER}:${branch_name}"
          
          # Aggiungi il tag 'latest' se è il branch main
          if [ "${branch_name}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            tags="$tags -t ${{ env.REGISTRY }}/${REPO_LOWER}:latest"
          fi

          docker buildx imagetools create $tags \
            $(printf "${{ env.REGISTRY }}/${REPO_LOWER}@sha256:%s " *)

      - name: Inspect image
        run: |
          REPO_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${REPO_LOWER}:latest || true